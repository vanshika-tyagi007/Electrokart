<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Electrokart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="products">
  <div id="header-slot"></div>
  <main class="container section">
    <div class="section-head">
      <div>
        <span class="small-caps">// Catalog</span>
        <h2 style="margin-top:1rem">The catalog.</h2>
        <p style="color:var(--text-secondary);margin-top:0.5rem">Every product engineered, tested and battle-hardened.</p>
      </div>
      <span class="small-caps" id="results-count" data-testid="results-count">— items</span>
    </div>

    <div class="filter-bar">
      <div>
        <label>Search</label>
        <input type="text" id="f-q" placeholder="e.g. Headphones, Electrokart..." data-testid="filter-search" />
      </div>
      <div>
        <label>Category</label>
        <select id="f-category" data-testid="filter-category"><option value="all">All</option></select>
      </div>
      <div>
        <label>Brand</label>
        <select id="f-brand" data-testid="filter-brand"><option value="">All</option></select>
      </div>
      <div>
        <label>Sort by</label>
        <select id="f-sort" data-testid="filter-sort">
          <option value="">Newest</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="rating">Rating</option>
          <option value="name">Name</option>
        </select>
      </div>
      <button class="btn btn-outline" id="reset-filters" data-testid="reset-filters">Reset</button>
    </div>

    <div class="product-grid" id="products-grid" data-testid="products-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;margin-top:2rem" data-testid="empty-state">
      <h3>Nothing matches.</h3>
      <p>Try a different search or reset the filters.</p>
    </div>
  </main>
  <div id="footer-slot"></div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/products.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"7f7b0fd8732c4326aae4b9d58d5c514a","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
